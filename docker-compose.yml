services:
  # 1. High-Fidelity MySQL 8 Database Server
  gymcrm-db:
    image: mysql:8
    container_name: gymcrm-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: ${DB_NAME:-gymcrm}
      MYSQL_USER: ${DB_USER:-gymuser}
      MYSQL_PASSWORD: ${DB_PASSWORD:-gympass}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  # 2. Production Cased GymFlow Core Application
  gymcrm-app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: gymcrm-app
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DB_HOST=gymcrm-db
      - DB_PORT=3306
      - DB_NAME=${DB_NAME:-gymcrm}
      - DB_USER=${DB_USER:-gymuser}
      - DB_PASSWORD=${DB_PASSWORD:-gympass}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - APP_URL=${APP_URL}
      - DOCUMENTS_DIR=/data/documents
      - UPLOADS_DIR=/data/uploads
    volumes:
      - documents_data:/data/documents
      - uploads_data:/data/uploads
    command: npm start
    depends_on:
      gymcrm-db:
        condition: service_healthy

  # 3. phpMyAdmin Database Web Console (Internal/Proxy)
  gymcrm-phpmyadmin:
    image: phpmyadmin:latest
    container_name: gymcrm-phpmyadmin
    restart: always
    ports:
      - "8080:80"
    environment:
      - PMA_HOST=gymcrm-db
      - PMA_PORT=3306
    depends_on:
      gymcrm-db:
        condition: service_healthy

# Production named storage volumes
volumes:
  mysql_data:
    driver: local
  documents_data:
    driver: local
  uploads_data:
    driver: local
